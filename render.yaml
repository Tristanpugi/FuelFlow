databases:
  - name: fuelflow-db
    databaseName: fuelflow
    plan: free

services:
  - type: web
    name: fuelflow
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fuelflow-db
          property: connectionString