<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 36" width="180" height="36">
  <!-- Pump icon -->
  <g>
    <!-- Pump body -->
    <rect x="2" y="6" width="22" height="28" rx="4" fill="none" stroke="#FF7A00" stroke-width="2"/>
    <!-- Screen -->
    <rect x="5" y="9" width="16" height="9" rx="2" fill="#FF7A00" opacity="0.15"/>
    <rect x="5" y="9" width="16" height="9" rx="2" fill="none" stroke="#FF7A00" stroke-width="1.2"/>
    <!-- Price text -->
    <text x="13" y="16.5" text-anchor="middle" font-family="monospace" font-size="5" fill="#FF7A00" font-weight="bold">1.649</text>
    <!-- Keypad -->
    <circle cx="8" cy="24" r="1.2" fill="#FF7A00" opacity="0.45"/>
    <circle cx="13" cy="24" r="1.2" fill="#FF7A00" opacity="0.45"/>
    <circle cx="18" cy="24" r="1.2" fill="#FF7A00" opacity="0.45"/>
    <circle cx="8" cy="29" r="1.2" fill="#FF7A00" opacity="0.45"/>
    <circle cx="13" cy="29" r="1.2" fill="#FF7A00" opacity="0.45"/>
    <circle cx="18" cy="29" r="1.2" fill="#FF7A00" opacity="0.45"/>
    <!-- Hose -->
    <path d="M24 12 Q32 12 32 19 Q32 24 26 24" stroke="#FF7A00" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Nozzle -->
    <rect x="22" y="22" width="6" height="3" rx="1.5" fill="#FF7A00"/>
    <!-- Base -->
    <rect x="0" y="34" width="26" height="2" rx="1" fill="#FF7A00" opacity="0.3"/>
  </g>
  <!-- Wordmark -->
  <text x="38" y="26" font-family="'Space Grotesk', Arial, sans-serif" font-size="20" font-weight="700" fill="#1f2b3d" letter-spacing="-0.5">Fuel<tspan fill="#FF7A00">Flow</tspan></text>
</svg>
